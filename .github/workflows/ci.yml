# ci.yml - קובץ ה-CI (Continuous Integration).
# GitHub קורא את הקובץ הזה אוטומטית מהנתיב .github/workflows/ - אין צורך "להריץ" אותו ידנית.
# בכל push (או pull_request ל-main), GitHub מקים מחשב וירטואלי נקי ומריץ עליו את הצעדים למטה.

name: CI   # שם ה-workflow, יופיע בלשונית Actions בגיטהאב

# on: מגדיר מתי ה-workflow הזה מופעל
on:
  push:                       # בכל push, לכל ענף
  pull_request:
    branches: [ main ]        # וגם כשנפתח/מתעדכן Pull Request לכיוון main

jobs:
  ci:                 # שם ה-job שלנו (נשתמש בו בהמשך גם ב-Branch Protection)
    runs-on: ubuntu-latest    # המחשב הווירטואלי שעליו נריץ - לינוקס עדכני, נקי בכל הרצה

    steps:
      # שלב 1: מוריד את הקוד שלנו מה-repo אל תוך המחשב הווירטואלי.
      - name: Checkout code
        uses: actions/checkout@v4

      # שלב 2: מתקין Java 17 על המחשב הווירטואלי (בדיוק הגרסה שאנחנו עובדים איתה).
      # cache: maven - שומר בין הרצות את הספריות מה-pom.xml, כדי לא להוריד מחדש בכל push.
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # שלב 3: הפקודה עצמה - מקמפל את הקוד ומריץ את כל הטסטים (JUnit).
      # -B = batch mode, מתאים להרצה אוטומטית. verify עושה גם compile וגם test.
      - name: Build and test
        run: mvn -B verify
